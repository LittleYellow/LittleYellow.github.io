baseURL = "https://littleyellow.github.io/"
languageCode = "zh-tw"
defaultContentLanguage = "zh-tw"
title = "Dev Notes"
theme = "stack"
hasCJKLanguage = true
enableEmoji = true

[author]
  name = "Developer"

[pagination]
  pagerSize = 5

[permalinks]
  post = "/p/:slug/"
  page = "/:slug/"

[params]
  mainSections = ["posts"]
  rssFullContent = true

  [params.footer]
    since = 2025

  [params.sidebar]
    subtitle = "記錄開發路上的坑與頓悟"

  [params.article]
    [params.article.license]
      enabled = false

  [params.widgets]
    homepage = [
      { type = "search" },
      { type = "archives", params = { limit = 5 } },
      { type = "tag-cloud", params = { limit = 10 } },
    ]
    page = [{ type = "toc" }]

  [params.comments]
    enabled = false

[taxonomies]
  tag = "tags"
  category = "categories"

[[menu.social]]
  identifier = "github"
  name       = "GitHub"
  url        = "https://github.com/LittleYellow"

  [menu.social.params]
    icon = "brand-github"

[menu]
  [[menu.main]]
    name   = "文章"
    url    = "posts/"
    weight = 10

  [[menu.main]]
    name   = "關於"
    url    = "about/"
    weight = 20
